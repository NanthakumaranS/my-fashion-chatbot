<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAnDHA — Style Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --gold: #c9a96e;
    --gold-light: #e8cfa0;
    --cream: #f5f0e8;
    --muted: #6a6a6a;
    --text: #e8e4dc;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 80%, rgba(201,169,110,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 20%, rgba(201,169,110,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .chat-shell {
    width: 420px;
    height: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,169,110,0.08);
    position: relative;
    animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1a1a1a 0%, var(--surface) 100%);
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .status-dot {
    width: 7px; height: 7px;
    background: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 6px #4ade80;
    animation: pulse 4s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Quick chips */
  .chips {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,169,110,0.06);
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
    max-width: 88%;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
  }
  .bot-avatar {
    background: linear-gradient(135deg, #2a2218, #1e1e18);
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 0.02em;
  }
  .user-avatar {
    background: rgba(201,169,110,0.15);
    border: 1px solid rgba(201,169,110,0.2);
    color: var(--gold-light);
    font-size: 11px;
  }

  .bubble {
    padding: 12px 15px;
    border-radius: 2px;
    font-size: 13.5px;
    line-height: 1.65;
    font-weight: 300;
  }
  .bot .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-left-radius: 0;
  }
  .user .bubble {
    background: linear-gradient(135deg, #2a2218, #221e14);
    border: 1px solid rgba(201,169,110,0.25);
    color: var(--gold-light);
    border-top-right-radius: 0;
  }

  /* Typing indicator */
  .typing .bubble {
    padding: 14px 16px;
  }
  .dots { display: flex; gap: 5px; align-items: center; height: 16px; }
  .dots span {
    width: 5px; height: 5px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0.4;
    animation: dotBounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%,60%,100% { transform: translateY(0); opacity:0.4; }
    30% { transform: translateY(-5px); opacity:1; }
  }

  /* Input area */
  .input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 300;
    resize: none;
    min-height: 42px;
    max-height: 100px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: rgba(201,169,110,0.4); }

  .send-btn {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--gold), #a8854a);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: linear-gradient(135deg, var(--gold-light), var(--gold)); transform: scale(1.03); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { fill: #0e0e0e; width: 16px; height: 16px; }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: #3a3a3a;
    margin-top: 8px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="chat-shell">
  <div class="header">
    <div class="header-top">
      <span class="brand">Nandha</span>
      <span class="status-dot"></span>
    </div>
    <div class="header-sub">Style Assistant · Always available</div>
  </div>

  <div class="chips">
    <button class="chip" onclick="sendChip('What collections are available?')">Collections</button>
    <button class="chip" onclick="sendChip('Track my order')">Track Order</button>
    <button class="chip" onclick="sendChip('Current promotions?')">Promotions</button>
    <button class="chip" onclick="sendChip('Sizing guide')">Sizing</button>
    <button class="chip" onclick="sendChip('Return policy')">Returns</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Ask about our collections…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="footer-note">Powered by Claude AI</div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are a sophisticated and warm style assistant for NANDHA, a premium clothing and fashion boutique. Your name is Aria.

You help customers with three main things:
1. **Product Questions** — Describe collections, fabrics, styles, outfit suggestions, sizing advice. Our current collections: "Lumière" (minimalist linen and silk separates), "Nuit" (eveningwear in deep jewel tones), "Atelier Basics" (everyday luxury essentials). Sizes range XS–3XL. We ship in 2–5 business days.

2. **Order Tracking** — Ask for their order number (format: MN-XXXXX). Then give a realistic tracking update. Example statuses: processing, shipped, out for delivery. Be helpful and reassuring.

3. **Promotions & Offers** — Current promotions: 20% off the "Lumière" collection with code LUMIERE20. Free shipping on orders above ₹3000. Loyalty members get early access to the Nuit winter drop next week.

Tone: Graceful, warm, and refined — like a knowledgeable friend who works in fashion. Keep responses concise (2–4 sentences usually). Use elegant phrasing. Never use bullet lists unless specifically asked. If you don't know something, offer to connect them with a human stylist via email: hello@maisonstore.in.`;

let history = [];
let isLoading = false;

function addMessage(role, text) {
  const container = document.getElementById('messages');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'bot'}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${isUser ? 'user-avatar' : 'bot-avatar'}`;
  avatar.textContent = isUser ? 'You' : 'A';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="avatar bot-avatar">A</div>
    <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function callClaude(userMessage) {
  history.push({ role: 'user', content: userMessage });

const HF_KEY = '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';

const messages = [
  { role: 'system', content: SYSTEM_PROMPT },
  ...history
];

const response = await fetch(
  'https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3/v1/chat/completions',
  {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + HF_KEY
    },
    body: JSON.stringify({
      model: 'mistralai/Mistral-7B-Instruct-v0.3',
      messages: messages,
      max_tokens: 500
    })
  }
);

const data = await response.json();
const reply = data.choices?.[0]?.message?.content || "I'm sorry, I couldn't process that. Please try again.";
  const data = await response.json();
  const reply = data.content?.[0]?.text || "I'm sorry, I couldn't process that. Please try again.";
  history.push({ role: 'assistant', content: reply });
  return reply;
}

async function sendMessage(overrideText) {
  const input = document.getElementById('input');
  const text = overrideText ?? input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  showTyping();

  try {
    const reply = await callClaude(text);
    removeTyping();
    addMessage('bot', reply);
  } catch (e) {
    removeTyping();
    addMessage('bot', 'Something went wrong. Please try again or email us at hello@maisonstore.in.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function sendChip(text) { sendMessage(text); }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// Welcome message on load
window.addEventListener('load', () => {
  setTimeout(() => {
    addMessage('bot', 'Welcome to Nandha. I\'m your personal style assistant. I can help you explore our collections, track your order, or find the best offers for you today. How may I assist?');
  }, 400);
});
</script>
</body>
</html>
